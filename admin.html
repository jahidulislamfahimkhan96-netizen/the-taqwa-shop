<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Taqwa Shop - জার্সি অর্ডার ফর্ম</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #1e3c72; margin-bottom: 5px; font-size: 24px; }
        .price-tag { text-align: center; color: #e03131; font-weight: bold; font-size: 18px; margin-bottom: 20px; background: #fff5f5; padding: 5px; border-radius: 6px; display: inline-block; width: 100%; }
        .live-chat-box { background-color: #e3fafc; border: 1px solid #99e9f2; padding: 12px; border-radius: 8px; text-align: center; margin-bottom: 20px; font-weight: bold; font-size: 14px; }
        .live-chat-box a { color: #0b7285; text-decoration: none; display: inline-block; margin-left: 5px; background: #22b8cf; color: white; padding: 4px 10px; border-radius: 4px; font-size: 13px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #333; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #e1e4e6; border-radius: 8px; font-size: 15px; }
        .radio-group { display: flex; gap: 15px; margin-top: 5px; }
        .radio-item { display: flex; align-items: center; gap: 5px; }
        button { width: 100%; padding: 14px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        .success-box { display: none; text-align: center; padding: 30px 20px; border-radius: 8px; font-size: 20px; font-weight: bold; color: #155724; background-color: #d4edda; border: 1px solid #c3e6cb; }
        .shop-closed-box { display: none; text-align: center; padding: 30px 20px; border-radius: 8px; font-size: 18px; font-weight: bold; color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="formTitle">জার্সি অর্ডার ফর্ম</h2>
    <div id="priceDisplay" class="price-tag">💰 মূল্য: <span id="currentPrice">৪৫০</span> টাকা</div>
    
    <div id="chatBox" class="live-chat-box">
        📞 সরাসরি লাইভ চ্যাট করতে চাইলে <a href="https://wa.me/8801966923096" target="_blank">এই লিঙ্কে ক্লিক করুন</a>
    </div>

    <div id="shopClosedBox" class="shop-closed-box">
        ❌ দুঃখিত! আমাদের শপ সাময়িকভাবে বন্ধ আছে। খুব শীঘ্রই আবার অর্ডার নেওয়া শুরু হবে।
    </div>
    
    <form id="orderForm">
        <div class="form-group">
            <label for="userName">আপনার নাম:</label>
            <input type="text" id="userName" placeholder="পূর্ণ নাম লিখুন" required>
        </div>
        
        <div class="form-group">
            <label for="userPhone">মোবাইল নম্বর (ইংরেজিতে):</label>
            <input type="tel" id="userPhone" placeholder="017XXXXXXXX" required>
        </div>
        
        <div class="form-group">
            <label>এই নাম্বারে আপনার কি আছে?</label>
            <div class="radio-group">
                <label class="radio-item"><input type="radio" name="appType" value="WhatsApp" checked> WhatsApp</label>
                <label class="radio-item"><input type="radio" name="appType" value="Imo"> Imo</label>
            </div>
        </div>
        
        <div class="form-group">
            <label for="productType">আপনি কোন জার্সি অর্ডার করতে চাচ্ছেন?</label>
            <select id="productType" required></select>
        </div>
        
        <div class="form-group">
            <label for="productSize">সাইজ (Size):</label>
            <select id="productSize" required></select>
        </div>
        
        <div class="form-group">
            <label for="productQty">পরিমাণ (কত পিস?):</label>
            <input type="number" id="productQty" value="1" min="1" required>
        </div>
        
        <div class="form-group">
            <label for="userAddress">ডেলিভারি ঠিকানা:</label>
            <textarea id="userAddress" placeholder="গ্রাম/রোড, থানা, জেলা লিখুন..." rows="3" required></textarea>
        </div>
        
        <button type="submit" id="submitBtn">অর্ডার কনফার্ম করুন</button>
    </form>

    <div id="successBox" class="success-box">
        ✅ আপনার ফর্মটি সফলভাবে সাবমিট হয়েছে
    </div>
</div>

<script>
    const BOT_TOKEN = "8900197927:AAEnwA_V0oUJqmm0bg3LflthuUGdlzco6dQ";
    const CHAT_ID = "8860505763";

    window.onload = function() {
        const shopStatus = localStorage.getItem('shopStatus') || 'open';
        const chatStatus = localStorage.getItem('chatStatus') || 'show';
        const price = localStorage.getItem('jerseyPrice') || '450';
        const sizes = (localStorage.getItem('jerseySizes') || 'M, L, XL, XXL').split(',');
        const jerseys = (localStorage.getItem('jerseyList') || "বাংলাদেশ অফিসিয়াল জার্সি, আর্জেন্টিনা জার্সি, ব্রাজিল জার্সি").split(',');

        // দাম আপডেট
        document.getElementById('currentPrice').innerText = price;

        // শপ স্ট্যাটাস চেক
        if(shopStatus === 'closed') {
            document.getElementById('orderForm').style.display = 'none';
            document.getElementById('priceDisplay').style.display = 'none';
            document.getElementById('shopClosedBox').style.display = 'block';
        }

        // চ্যাট বক্স চেক
        if(chatStatus === 'hide') document.getElementById('chatBox').style.display = 'none';

        // জার্সি লোড
        const pSelect = document.getElementById('productType');
        pSelect.innerHTML = '<option value="" disabled selected>জার্সি বাছাই করুন...</option>';
        jerseys.forEach(j => { if(j.trim()) pSelect.innerHTML += `<option value="${j.trim()}">${j.trim()}</option>`; });

        // সাইজ লোড
        const sSelect = document.getElementById('productSize');
        sSelect.innerHTML = '<option value="" disabled selected>সাইজ বাছাই করুন...</option>';
        sizes.forEach(s => { if(s.trim()) sSelect.innerHTML += `<option value="${s.trim()}">${s.trim()}</option>`; });
    };

    document.getElementById('orderForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = "সাবমিট হচ্ছে...";

        const name = document.getElementById('userName').value;
        let phone = document.getElementById('userPhone').value.trim();
        const appType = document.querySelector('input[name="appType"]:checked').value;
        const product = document.getElementById('productType').value;
        const size = document.getElementById('productSize').value;
        const qty = document.getElementById('productQty').value;
        const address = document.getElementById('userAddress').value;
        const price = localStorage.getItem('jerseyPrice') || '450';

        if (!phone.startsWith('88')) { phone = phone.startsWith('0') ? '88' + phone : '880' + phone; }

        const totalCost = parseInt(price) * parseInt(qty);
        const messageText = `👕 **নতুন জার্সির অর্ডার এসেছে!**\n\n👤 **নাম:** ${name}\n📞 **মোবাইল:** ${phone.replace('88', '0')}\n📱 **মাধ্যম:** ${appType}\n⚽ **জার্সি:** ${product}\n📏 **সাইজ:** ${size}\n🔢 **পরিমাণ:** ${qty} পিস\n💰 **মোট মূল্য:** ${totalCost} টাকা\n📍 **ঠিকানা:** ${address}`;

        let actionURL = (appType === "WhatsApp") ? `https://wa.me/${phone}` : `https://imo.im/s/d/bangladesh/${phone.replace('88', '')}`;
        let buttonText = (appType === "WhatsApp") ? "💬 WhatsApp-এ মেসেজ দিন" : "📱 Imo-তে মেসেজ দিন";

        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text: messageText, reply_markup: { inline_keyboard: [[{ text: buttonText, url: actionURL }]] } })
        })
        .then(res => res.json())
        .then(data => {
            if(data.ok) {
                document.getElementById('orderForm').style.display = 'none';
                document.getElementById('chatBox').style.display = 'none';
                document.getElementById('priceDisplay').style.display = 'none';
                document.getElementById('formTitle').style.display = 'none';
                document.getElementById('successBox').style.display = 'block';
            } else {
                alert("ত্রুটি হয়েছে! আবার চেষ্টা করুন।");
                submitBtn.disabled = false;
            }
        });
    });
</script>
</body>
</html>
